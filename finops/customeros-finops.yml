meters:
- name: self_hosted_infrastructure
  description: Compute, database (PostgreSQL, Neo4j), and networking cost of running the open-source customer-os-api stack yourself. Not billed by CustomerOS.
  unit: infrastructure-hours
  aggregation: sum
  dimensions:
  - deployment
  - service
- name: cloud_subscription
  description: Negotiated customeros.ai cloud subscription. No public per-call metering.
  unit: contract
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: For self-hosted, monitor infrastructure spend for the customer-os-api services and their PostgreSQL/Neo4j backends; for cloud, track the subscription invoice.
- name: Allocation
  description: Tag infrastructure (or cloud workspaces) per team/workload to map CustomerOS spend to cost centers.
- name: Optimization
  description: Self-host to avoid subscription cost where in-house ops capacity exists; right-size database and compute for the customer-os-api stack.
- name: Accountability
  description: Assign an owner for the CustomerOS deployment or cloud contract; review spend against budget on the billing cycle.
maintainers:
