description: >-
  FinOps view of CustomerOS spend. CustomerOS has two cost models: (1) self-hosting
  the open-source Apache-2.0 customer-os-api GraphQL stack, where cost is the
  operator's own infrastructure (compute, PostgreSQL, Neo4j, networking) rather
  than a per-call API charge; and (2) the sales-led customeros.ai cloud, billed via
  a negotiated subscription with no public itemized API meters. Because pricing is
  contact-sales / self-hosted, FOCUS cost columns are not reconciled here.
notes: >-
  No public usage-metered pricing exists; this artifact captures the cost
  structure qualitatively. For self-hosted, track cloud-infrastructure spend for
  the supporting services; for the cloud, track the negotiated subscription.
  Verify against customeros.ai during reconciliation.
sources:
- https://customeros.ai
