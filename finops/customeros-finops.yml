  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: CustomerOS
serviceCategory: Customer Relationship Management
billingModel:
  pricingCategory: Subscription / Self-Hosted
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
focusColumns:
  ServiceName: CustomerOS
  ServiceCategory: Customer Relationship Management
  ProviderName: CustomerOS
  PublisherName: CustomerOS
  InvoiceIssuerName: CustomerOS
  BillingCurrency: USD
